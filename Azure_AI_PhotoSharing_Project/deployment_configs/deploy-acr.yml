name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main
    paths:
      - 'ai-photo-sharing-source/**'
      - '.github/workflows/deploy-acr.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY_NAME: cwayaacr.azurecr.io
  IMAGE_NAME: ai-photo-sharing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: 5b8f0f40-f894-4a06-8f85-700b1d6d54f1
          tenant-id: 7aa45fe2-49a5-4b25-88fd-237a91c1ab6a
          subscription-id: 3c0f70a1-56e9-41bc-8914-9bbf1bb3f0f6

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name cwayaacr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-photo-sharing-source
          push: true
          tags: ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
